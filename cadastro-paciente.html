<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/cadastro-paciente.css" />
    <title>MedConecta - Cadastro Paciente</title>
  </head>
  <body>
    <main class="auth-page">
      <div class="card">
        <h1>Cadastro de Paciente</h1>
        <p class="page__subtitle">Crie sua conta para começar</p>

        <form id="formCadastro" data-qa="form-cadastro-paciente">
          <div class="form-field">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" class="form-input" required data-qa="input-nome" />
            <div class="form-error" data-erro-de="nome" data-qa="erro-nome"></div>
          </div>
          <div class="form-field">
            <label for="dataNascimento">Data de nascimento</label>
            <input type="date" id="dataNascimento" class="form-input" required data-qa="input-data-nascimento" />
          </div>
          <div class="form-field">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" class="form-input" placeholder="(11) 99999-9999" required data-qa="input-telefone" />
          </div>
          <div class="form-field">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-input" required data-qa="input-email" />
            <div class="form-error" data-erro-de="email" data-qa="erro-email"></div>
          </div>
          <div class="form-field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" class="form-input" required minlength="6" data-qa="input-senha" />
            <div class="form-error" data-erro-de="senha" data-qa="erro-senha"></div>
          </div>
          <button type="submit" class="btn btn--primary" data-qa="btn-cadastrar">Cadastrar</button>
        </form>

        <p class="auth-link">
          Já tem conta? <a href="login-paciente.html" data-qa="link-login-paciente">Fazer login</a>
        </p>
      </div>
    </main>

    <script src="js/dados.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/interface.js"></script>
    <script src="js/cadastro-paciente.js"></script>
  </body>
</html>
