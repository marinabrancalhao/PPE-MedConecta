<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/buscar-medicos.css" />
    <title>MedConecta - Buscar Médicos</title>
  </head>
  <body>
    <header class="header">
      <a href="buscar-medicos.html" data-qa="header-logo-link">
        <img src="img/logo_medconecta_header.png" alt="MedConecta" class="header__logo" />
      </a>
      <nav class="header__nav">
      <a href="buscar-medicos.html" aria-current="page" data-qa="nav-buscar-medicos">Buscar Médicos</a>
      <a href="minhas-consultas.html" data-qa="nav-minhas-consultas">Minhas Consultas</a>
      <a href="perfil-paciente.html" data-qa="nav-perfil-paciente">Meu Perfil</a>
      </nav>
    </header>
    <div id="barraSessao"></div>

    <main class="page">
      <h1 class="page__title">Buscar médicos</h1>
      <p class="page__subtitle">Encontre um profissional e solicite sua consulta</p>

      <div class="search-bar">
        <label for="campoBusca" class="sr-only">Pesquisar médicos</label>
        <input
          type="text"
          id="campoBusca"
          class="form-input"
          placeholder="Buscar por nome, especialidade ou cidade..."
          data-qa="input-busca"
        />
      </div>

      <div class="grupo-filtros" id="filtrosEspecialidade" data-qa="filtros-especialidade"></div>

      <div id="listaMedicos" data-qa="lista-medicos"></div>
    </main>

    <script src="js/dados.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/interface.js"></script>
    <script src="js/buscar-medicos.js"></script>
  </body>
</html>
