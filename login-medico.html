<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login-medico.css" />
    <title>MedConecta - Login Médico</title>
  </head>
  <body>
    <main class="auth-page">
      <div class="card">
        <h1>Login do Médico</h1>
        <p class="page__subtitle">Acesse sua agenda e solicitações</p>

        <form id="formLogin" data-qa="form-login-medico">
          <div class="form-field">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-input" required data-qa="input-email" />
          </div>
          <div class="form-field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" class="form-input" required data-qa="input-senha" />
          </div>
          <div class="form-error" id="erroLogin" data-qa="erro-login"></div>
          <button type="submit" class="btn btn--primary" data-qa="btn-entrar">Entrar</button>
        </form>

        <p class="auth-link">
          Ainda não tem conta? <a href="cadastro-medico.html" data-qa="link-cadastro-medico">Cadastre-se</a>
        </p>
        <p class="auth-link"><a href="index.html" data-qa="link-voltar"><img src="img/icons/arrow.png" alt="" class="icon" /> Voltar</a></p>
      </div>
    </main>

    <script src="js/dados.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/interface.js"></script>
    <script src="js/login-medico.js"></script>
  </body>
</html>
