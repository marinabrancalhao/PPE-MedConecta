<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/perfil-paciente.css" />
    <title>MedConecta - Meu Perfil</title>
  </head>
  <body>
    <header class="header">
      <a href="buscar-medicos.html" data-qa="header-logo-link">
        <img src="img/logo_medconecta_header.png" alt="MedConecta" class="header__logo" />
      </a>
      <nav class="header__nav">
      <a href="buscar-medicos.html" data-qa="nav-buscar-medicos">Buscar Médicos</a>
      <a href="minhas-consultas.html" data-qa="nav-minhas-consultas">Minhas Consultas</a>
      <a href="perfil-paciente.html" aria-current="page" data-qa="nav-perfil-paciente">Meu Perfil</a>
      </nav>
    </header>
    <div id="barraSessao"></div>

    <main class="page">
      <h1 class="page__title">Meu perfil</h1>
      <p class="page__subtitle">Atualize seus dados pessoais</p>

      <div class="card">
        <form id="formPerfil" data-qa="form-perfil-paciente">
          <div class="form-field">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" class="form-input" required data-qa="input-nome" />
            <div class="form-error" data-erro-de="nome" data-qa="erro-nome"></div>
          </div>
          <div class="form-field">
            <label for="dataNascimento">Data de nascimento</label>
            <input type="date" id="dataNascimento" class="form-input" required data-qa="input-data-nascimento" />
          </div>
          <div class="form-field">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" class="form-input" required data-qa="input-telefone" />
          </div>
          <div class="form-field">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-input" required data-qa="input-email" />
            <div class="form-error" data-erro-de="email" data-qa="erro-email"></div>
          </div>
          <button type="submit" class="btn btn--primary" data-qa="btn-salvar">Salvar alterações</button>
        </form>
      </div>
    </main>

    <script src="js/dados.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/interface.js"></script>
    <script src="js/perfil-paciente.js"></script>
  </body>
</html>
